name: "💡 Feature Request (기능 개발)"
description: "새로운 기능을 개발할 때 작성하는 이슈 템플릿입니다."
title: "[Feat] 기능명"
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 기능 개발 개요
        어떤 기능인지 간단하게 요약해 주세요.
  - type: textarea
    id: goal
    attributes:
      label: "🎯 개발 목표"
      placeholder: "구체적으로 구현해야 할 목표들을 적어주세요. (예: 이메일 유효성 검사, 로그인 UI)"
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: "📋 세부 작업 태스크"
      placeholder: "- [ ] 로그인 API 연결\n- [ ] UI 스타일링 적용"
    validations:
      required: true
  - type: textarea
    id: etc
    attributes:
      label: "🔗 기타 참고사항"
      placeholder: "참고 문서 링크나 디자인 시안 등을 적어주세요."
